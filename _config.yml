# Site settings
title: My Personal Website
# email: your-email@example.com
description: > # this means to ignore newlines until "baseurl:"
  This is my personal website where I share my projects, blog posts, and more.
# baseurl: "" # the subpath of your site, e.g. /blog
url: "https://eflynn8.github.io" # the base hostname & protocol for your site

# Social media links (optional)
twitter_username: your_twitter_handle
github_username: your_github_username
linkedin_username: your_linkedin_username

# Build settings
markdown: kramdown
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Permalinks
permalink: /:title/

# Pagination settings (optional)
paginate: 5
paginate_path: "/page:num/"

# Exclude from processing
exclude:
  - README.md

# Defaults for posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Your Name"

# Jekyll Feed (optional)
feed:
  path: feed.xml

# SEO tag (optional)
seo:
  title: "My Personal Website"
  description: "A personal website built using Jekyll and GitHub Pages."
  twitter: your_twitter_handle
